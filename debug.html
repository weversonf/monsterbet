<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monster Bet - Diagnóstico</title>
  <style>
    body {
      font-family: 'Inter', Arial, sans-serif;
      background: #08090a;
      color: #e2e8f0;
      padding: 40px 20px;
      max-width: 600px;
      margin: 0 auto;
    }
    h1 { color: #39ff14; }
    input {
      width: 100%;
      padding: 12px;
      font-size: 1rem;
      border: 1px solid #333;
      border-radius: 8px;
      background: #111;
      color: white;
      margin: 10px 0;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #39ff14;
      color: black;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover { background: #32e612; }
    pre {
      background: #111;
      padding: 15px;
      border-radius: 8px;
      border: 1px solid #333;
      white-space: pre-wrap;
      word-break: break-word;
      margin-top: 20px;
    }
    .ok { color: #39ff14; }
    .erro { color: #ff4444; }
    .aviso {
      background: #1a1a00;
      border: 1px solid #665500;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <h1>🔧 Diagnóstico do Token</h1>

  <div class="aviso">
    Esta página compara o token que você digita com o configurado no Netlify, sem mostrar o token real.
  </div>

  <label>Digite o token de admin:</label>
  <input type="text" id="tokenInput" placeholder="Ex: MonsterBet2026!">

  <button onclick="testarToken()">TESTAR TOKEN</button>

  <pre id="resultado">Aguardando teste...</pre>

  <script>
    async function testarToken() {
      const token = document.getElementById('tokenInput').value.trim();
      const resultado = document.getElementById('resultado');

      if (!token) {
        resultado.textContent = '⚠️ Digite um token primeiro.';
        return;
      }

      resultado.textContent = '⏳ Testando...';

      try {
        const res = await fetch('/.netlify/functions/api?debug=token', {
          method: 'GET',
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });

        const data = await res.json();

        let msg = '';
        if (data.match) {
          msg += '✅ TOKEN CORRETO!\n\n';
        } else {
          msg += '❌ TOKEN INCORRETO\n\n';
        }

        msg += `Token configurado no Netlify: ${data.configured ? 'SIM' : 'NÃO'}\n`;
        msg += `Tamanho do token configurado: ${data.configuredLength}\n`;
        msg += `Início do token configurado: ${data.configuredStartsWith}\n`;
        msg += `Final do token configurado: ${data.configuredEndsWith}\n\n`;

        msg += `Você enviou header Authorization: ${data.receivedHeader ? 'SIM' : 'NÃO'}\n`;
        msg += `Tamanho do token enviado: ${data.receivedLength}\n`;
        msg += `Início do token enviado: ${data.receivedStartsWith}\n`;
        msg += `Final do token enviado: ${data.receivedEndsWith}\n\n`;

        if (data.configuredLength !== data.receivedLength) {
          msg += '⚠️ Os tamanhos são diferentes.\n';
          msg += 'Possíveis causas:\n';
          msg += '- O deploy ainda não foi feito após trocar a variável\n';
          msg += '- O token foi salvo com espaços extras\n';
          msg += '- O Netlify cortou caracteres do token\n';
        }

        resultado.textContent = msg;
        resultado.className = data.match ? 'ok' : 'erro';

      } catch (err) {
        resultado.textContent = '❌ Erro ao testar: ' + err.message;
        resultado.className = 'erro';
      }
    }

    document.getElementById('tokenInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') testarToken();
    });
  </script>
</body>
</html>
